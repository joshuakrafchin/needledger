services:
  - type: web
    name: need-ledger-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: need-ledger-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: ADMIN_SECRET
        generateValue: true

databases:
  - name: need-ledger-db
    plan: free
